  <script>
    function copyCA() {
      navigator.clipboard.writeText("4mzZ3oMXchsPpc3g7YD6Yn6HP8zEbaSviwCVA9khpump");
      alert("CA copied to clipboard!");
    }

    const postsContainer = document.getElementById('posts');

    function addPost(post) {
      const div = document.createElement('div');
      div.className = `post-card bg-zinc-900 border border-yellow-500/20 rounded-2xl p-5`;
      div.innerHTML = `
        <div class="flex gap-x-4">
          <div class="text-4xl">🐂</div>
          <div class="flex-1">
            <div class="flex items-center gap-x-2 mb-1">
              <span class="font-bold">@helenahseva</span>
              <span class="text-[10px] px-2 py-0.5 bg-yellow-400 text-black rounded">BASED</span>
            </div>
            <p class="text-lg">${post.text}</p>
            <div class="text-xs text-yellow-500/60 mt-3">${new Date(post.created_at).toLocaleTimeString()}</div>
          </div>
        </div>
      `;
      postsContainer.prepend(div);
      if (postsContainer.children.length > 8) postsContainer.lastChild.remove();
    }

    async function loadPreviousPosts() {
      try {
        const res = await fetch('/api/search');
        const data = await res.json();
        console.log("Search response:", data);

        if (data.error) {
          console.error("Search error:", data.error);
          return;
        }

        if (data.posts && data.posts.length > 0) {
          data.posts.forEach(post => addPost(post));
        } else {
          console.log("No recent posts found");
        }
      } catch (e) {
        console.error("Failed to load previous posts:", e);
      }
    }

    const eventSource = new EventSource('/api/stream');
    eventSource.onmessage = function(event) {
      const post = JSON.parse(event.data);
      if (post.text) addPost(post);
    };

    loadPreviousPosts();
  </script>
